<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>PEDIDITO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:black;
    color:white;
    min-height:100vh;
}

/* LOGIN */

#loginScreen{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

.loginBox{
    display:flex;
    gap:10px;
}

.loginBox input{
    background:black;
    border:1px solid #444;
    color:white;
    padding:12px;
    width:180px;
    text-align:center;
    font-size:18px;
}

.loginBox button{
    background:white;
    color:black;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    font-weight:bold;
}

/* APP */

#app{
    display:none;
    min-height:100vh;
    background-image:url("assets/fondo.png");
    background-size:100% auto;
    background-repeat:no-repeat;
    background-position:center top;
    background-color:#87d8ff;
    padding:20px;
}

.overlay{
    background:rgba(255,255,255,0.82);
    backdrop-filter:blur(4px);
    border-radius:25px;
    padding:20px;
    max-width:420px;
    margin:auto;
    margin-top:20px;
}

h1{
    text-align:center;
    color:black;
    margin-bottom:20px;
}

.nombre{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border-radius:12px;
    border:none;
    font-size:16px;
}

table{
    width:100%;
    color:black;
    border-collapse:collapse;
}

td{
    padding:10px 5px;
    font-size:16px;
}

.numberInput{
    width:70px;
    padding:8px;
    border-radius:10px;
    border:none;
    text-align:center;
    font-size:16px;
}

.total{
    margin-top:20px;
    text-align:right;
}

#nombreError{
    display:none;
    color:red;
    font-weight:bold;
    margin-top:-12px;
    margin-bottom:14px;
    font-size:14px;
}

.sendBtn{
    width:100%;
}

/* THANK YOU */

#thanks{
    display:none;
    width:100%;
    height:100vh;
    background:black;
    justify-content:center;
    align-items:center;
    color:red;
    font-size:40px;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

    <div class="loginBox">
        <input type="password" id="password" placeholder="********">
        <button onclick="login()">ENVIAR</button>
    </div>

</div>

<!-- APP -->

<div id="app">

    <div class="overlay">

        <h1>PEDIDITO 🌈</h1>

       <input class="nombre" type="text" id="nombre" placeholder="Nombre">
<div id="nombreError">Pon un nombre</div>

        <table>

            <tr>
                <td>C</td>
                <td>(min 1)</td>
                <td>50€</td>
                <td><input class="numberInput" type="number" min="0" value="0" id="c"></td>
            </tr>

            <tr>
                <td>K</td>
                <td>(min 1)</td>
                <td>20€</td>
                <td><input class="numberInput" type="number" min="0" value="0" id="k"></td>
            </tr>

            <tr>
                <td>M</td>
                <td>(min 5)</td>
                <td>10€</td>
                <td><input class="numberInput" type="number" min="0" value="0" id="m"></td>
            </tr>

            <tr>
                <td>P</td>
                <td>(min 10)</td>
                <td>4€</td>
                <td><input class="numberInput" type="number" min="0" value="0" id="p"></td>
            </tr>

            <tr>
                <td>SP</td>
                <td>(min 5)</td>
                <td>8€</td>
                <td><input class="numberInput" type="number" min="0" value="0" id="sp"></td>
            </tr>

        </table>

        <div class="total">
            TOTAL: <span id="total">0€</span>
        </div>

        <button class="sendBtn" onclick="enviar()">
            ENVIAR
        </button>

    </div>

</div>

<!-- THANKS -->

<div id="thanks">
    GRACIAS
</div>

<script>

const PASSWORD = "LOL";

function login(){

    const pass = document.getElementById("password").value;

    if(pass === PASSWORD){

        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("app").style.display = "block";

    }

}

const precios = {
    c:50,
    k:20,
    m:10,
    p:4,
    sp:8
};

const inputs = document.querySelectorAll(".numberInput");

inputs.forEach(input => {
    input.addEventListener("input", calcularTotal);
});

function calcularTotal(){

    let total = 0;

    total += Number(document.getElementById("c").value) * precios.c;
    total += Number(document.getElementById("k").value) * precios.k;
    total += Number(document.getElementById("m").value) * precios.m;
    total += Number(document.getElementById("p").value) * precios.p;
    total += Number(document.getElementById("sp").value) * precios.sp;

    document.getElementById("total").innerText = total + "€";

}

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbya-RezXL0Koe0DsfhsIuZkzvwnmjCY2qsqXmB6dVO05yhlTQ0Z43Xs_mW_6pV8D1wbtg/exec";

function enviar(){

    const nombreInput = document.getElementById("nombre");
    const nombre = nombreInput.value.trim();

    if(nombre === ""){
        nombreInput.style.border = "2px solid red";
        document.getElementById("nombreError").style.display = "block";
        return;
    }

    nombreInput.style.border = "none";
    document.getElementById("nombreError").style.display = "none";

    const datos = {
        nombre: nombre,
        c: document.getElementById("c").value,
        k: document.getElementById("k").value,
        m: document.getElementById("m").value,
        p: document.getElementById("p").value,
        sp: document.getElementById("sp").value
    };

    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(datos)
    });

    document.getElementById("app").style.display = "none";
    document.getElementById("thanks").style.display = "flex";
}

</script>

</body>
</html>
